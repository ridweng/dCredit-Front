services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dcredit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dcredit
      POSTGRES_USER: dcredit
      POSTGRES_PASSWORD: dcredit_dev_password
    ports:
      - '5433:5432'
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dcredit -d dcredit']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Mailpit — SMTP catch-all + Web UI
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: dcredit-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP — configure apps/app-api + apps/admin-api SMTP_PORT=1025
      - '8025:8025'   # Web UI — open http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://localhost:8025']
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # NestJS App API
  # ─────────────────────────────────────────
  app-api:
    container_name: dcredit-app-api
    build:
      context: .
      dockerfile: apps/app-api/Dockerfile
    command: pnpm --filter @dcredit/app-api start:dev
    restart: unless-stopped
    working_dir: /workspace
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: dcredit
      DATABASE_USER: dcredit
      DATABASE_PASSWORD: dcredit_dev_password
      DATABASE_URL: postgresql://dcredit:dcredit_dev_password@postgres:5432/dcredit
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@dcredit.local
      APP_API_URL: http://localhost:3001
      ADMIN_UI_ORIGIN: http://localhost:3002
      JWT_SECRET: dev-only-change-me-secret-was-changed?!
      JWT_EXPIRES_IN: 1h
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    volumes:
      - ./apps/app-api:/workspace/apps/app-api
      - ./apps/admin-api:/workspace/apps/admin-api
      - ./packages:/workspace/packages
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
      - ./tsconfig.base.json:/workspace/tsconfig.base.json:ro
      - ./tsconfig.json:/workspace/tsconfig.json:ro
      - /workspace/node_modules
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # NestJS Admin API
  # ─────────────────────────────────────────
  admin-api:
    container_name: dcredit-admin-api
    build:
      context: .
      dockerfile: apps/admin-api/Dockerfile
    command: pnpm --filter @dcredit/admin-api start:dev
    restart: unless-stopped
    working_dir: /workspace
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: dcredit
      DATABASE_USER: dcredit
      DATABASE_PASSWORD: dcredit_dev_password
      DATABASE_URL: postgresql://dcredit:dcredit_dev_password@postgres:5432/dcredit
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@dcredit.local
      APP_API_URL: http://localhost:3002
      ADMIN_UI_ORIGIN: http://localhost:3002
      CORS_ORIGINS: http://localhost:3002
      JWT_SECRET: dev-only-change-me-secret-was-changed?!
      JWT_EXPIRES_IN: 1h
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    volumes:
      - ./apps/app-api:/workspace/apps/app-api
      - ./apps/admin-api:/workspace/apps/admin-api
      - ./packages:/workspace/packages
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
      - ./tsconfig.base.json:/workspace/tsconfig.base.json:ro
      - ./tsconfig.json:/workspace/tsconfig.json:ro
      - /workspace/node_modules
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3002/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
