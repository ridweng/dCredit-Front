kind = "web"
previewPath = "/web/"
title = "dCredit Web App"
version = "1.0.0"
id = "artifacts/dcredit-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/web/" ]
localPort = 23301

[services.development]
run = "pnpm --filter @workspace/dcredit-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dcredit-web", "run", "build" ]
publicDir = "artifacts/dcredit-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23301"
BASE_PATH = "/web/"
