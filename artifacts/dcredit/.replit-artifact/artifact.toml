kind = "web"
previewPath = "/"
title = "dCredit"
version = "1.0.0"
id = "artifacts/dcredit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21908

[services.development]
run = "pnpm --filter @workspace/dcredit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dcredit", "run", "build" ]
publicDir = "artifacts/dcredit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21908"
BASE_PATH = "/"
